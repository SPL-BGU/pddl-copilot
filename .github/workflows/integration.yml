name: Integration Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/spl-bgu/pddl-sandbox:latest

jobs:
  static-checks:
    name: Static Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run static checks
        run: bash tests/static_checks.sh

  plugin-tests:
    name: Plugin Integration Tests
    runs-on: ubuntu-latest
    needs: static-checks
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pull Docker image
        run: docker pull ${{ env.IMAGE }}

      - name: Test pddl-solver
        run: bash plugins/pddl-solver/tests/verify.sh ${{ env.IMAGE }}

      - name: Test pddl-validator
        run: bash plugins/pddl-validator/tests/verify.sh ${{ env.IMAGE }}

  mcp-protocol:
    name: MCP Protocol Smoke Tests
    runs-on: ubuntu-latest
    needs: static-checks
    steps:
      - uses: actions/checkout@v4

      - name: Pull Docker image
        run: docker pull ${{ env.IMAGE }}

      - name: MCP tools/list validation
        run: bash tests/mcp_protocol_test.sh ${{ env.IMAGE }}
