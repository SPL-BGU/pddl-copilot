name: Integration Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/spl-bgu/pddl-sandbox:latest

jobs:
  static-checks:
    name: Static Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run static checks
        run: bash tests/static_checks.sh

  plugin-tests:
    name: Plugin Integration Tests (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: static-checks
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image
        run: docker pull ${{ env.IMAGE }}

      - name: Test pddl-validator
        run: bash plugins/pddl-validator/tests/verify.sh ${{ env.IMAGE }}

  mcp-protocol:
    name: MCP Protocol Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: static-checks
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image
        run: docker pull ${{ env.IMAGE }}

      - name: MCP tools/list validation
        run: bash tests/mcp_protocol_test.sh ${{ env.IMAGE }}

  pddl-parser-tests:
    name: pddl-parser Tests (Tier 1)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: static-checks
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Test pddl-parser
        run: bash plugins/pddl-parser/tests/verify.sh

  pddl-solver-tests:
    name: pddl-solver Tests (Tier 1)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: static-checks
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install uv
        run: pip install uv

      - name: Test pddl-solver
        run: bash plugins/pddl-solver/tests/verify.sh
