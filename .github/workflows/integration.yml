name: Integration Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  static-checks:
    name: Static Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run static checks
        run: python3 tests/static_checks.py

  pddl-validator-tests:
    name: pddl-validator Tests (Tier 1)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: static-checks
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Test pddl-validator
        run: python3 plugins/pddl-validator/tests/verify.py

  mcp-protocol:
    name: MCP Protocol Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: static-checks
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: MCP tools/list validation
        run: python3 tests/mcp_protocol_test.py

  pddl-parser-tests:
    name: pddl-parser Tests (Tier 1)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: static-checks
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Test pddl-parser
        run: python3 plugins/pddl-parser/tests/verify.py

  pddl-solver-tests:
    name: pddl-solver Tests (Tier 1)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: static-checks
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install uv
        run: pip install uv

      - name: Test pddl-solver
        run: python3 plugins/pddl-solver/tests/verify.py
